<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Informações - Slideshow</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #site-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <audio id="alerta-som" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <iframe id="site-frame" src="" title="Slideshow de Páginas Operacionais"></iframe>

    <script>
        const sites = [
            { nome: "Relógio", url: "https://jpleiria.github.io/Relogio_painel/", tempo: 30000 },
            { nome: "Ocorrências", url: "https://app.gescorp.pt/app/quartel/fvd.php?display=OCCOR&key=xuvPnG2JEsuVNy%2FEK9%2Ff%2BhkLSOKo%2BBWl%3ADsDe5ZjIOcb9Bg9kQ1zTUBc3gOmptb4%2B", tempo: 20000 },
            { nome: "Viaturas", url: "https://app.gescorp.pt/app/quartel/fvd.php?display=VIATU&key=xuvPnG2JEsuVNy%2FEK9%2Ff%2BhkLSOKo%2BBWl%3ADsDe5ZjIOcb9Bg9kQ1zTUBc3gOmptb4%2B", tempo: 15000 },
            { nome: "Escalas", url: "https://app.gescorp.pt/app/quartel/fvd.php?display=ESCAL&key=xuvPnG2JEsuVNy%2FEK9%2Ff%2BhkLSOKo%2BBWl%3ADsDe5ZjIOcb9Bg9kQ1zTUBc3gOmptb4%2B", tempo: 15000 },
{ nome: "MeteoLeiria", url: "https://jpleiria.github.io/meteo_leiria/", tempo: 25000 }

        ];

        const URL_TROCA_TURNO = "https://jpleiria.github.io/troca_turno/";
        const DURACAO_TROCA_TURNO = 60000; // 1 minuto na tela de troca
        
        let indiceAtual = 0;
        let timeoutSlideshow;
        let emTrocaDeTurno = false; 

        const iframe = document.getElementById('site-frame');
        const somAlerta = document.getElementById('alerta-som');

        function carregarSlideshow() {
            if (emTrocaDeTurno) return;

            const siteAtual = sites[indiceAtual];
            console.log(`Carregando: ${siteAtual.nome}`);
            iframe.src = siteAtual.url;

            indiceAtual = (indiceAtual + 1) % sites.length;
            
            clearTimeout(timeoutSlideshow);
            timeoutSlideshow = setTimeout(carregarSlideshow, siteAtual.tempo);
        }

        function verificarHorarioPrioritario() {
            const agora = new Date();
            const hora = agora.getHours();
            const minuto = agora.getMinutes();
            const segundo = agora.getSeconds();

            // Ativação precisa no segundo 0 das 08:00 ou 20:00
            if ((hora === 8 || hora === 20) && minuto === 0 && segundo === 0 && !emTrocaDeTurno) {
                console.log("Horário de Troca de Turno: Ativando...");
                
                emTrocaDeTurno = true;
                clearTimeout(timeoutSlideshow);
                
                iframe.src = URL_TROCA_TURNO;
                somAlerta.play().catch(e => console.log("Áudio bloqueado pelo navegador. Requer clique inicial."));

                // Agenda o retorno ao carrossel normal
                setTimeout(() => {
                    console.log("Fim da Troca de Turno. Retornando ao fluxo normal.");
                    emTrocaDeTurno = false;
                    carregarSlideshow();
                }, DURACAO_TROCA_TURNO);
            }
        }

        // Verifica o relógio a cada segundo para garantir o disparo às 08:00:00
        setInterval(verificarHorarioPrioritario, 1000);

        // Inicia o sistema
        carregarSlideshow();
    </script>
</body>
</html>
